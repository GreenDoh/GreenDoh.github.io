<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f9f2e7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NameGen">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <title>✨ Генератор имён | PWA приложение</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f9f2e7 0%, #ffe6f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        .blob {
            position: fixed;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(255,190,200,0.4) 0%, rgba(210,160,255,0.2) 100%);
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
        }
        .blob-1 { top: -20vh; left: -10vw; }
        .blob-2 { bottom: -30vh; right: -15vw; background: radial-gradient(circle, rgba(170,210,255,0.4), rgba(255,220,180,0.2)); }

        .card {
            position: relative;
            z-index: 10;
            max-width: 650px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255,255,240,0.6);
            padding: 2rem 2rem 2.5rem;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,245,0.7);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255,255,240,0.7);
            backdrop-filter: blur(4px);
            padding: 0.4rem 1rem;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #b45f6b;
            border: 1px solid rgba(255,200,180,0.6);
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2D2F36, #8B5F6C);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.01em;
        }
        .sub {
            color: #6f5b62;
            margin-top: 0.6rem;
            font-weight: 400;
            font-size: 0.95rem;
        }

        .name-display {
            background: white;
            border-radius: 44px;
            padding: 2rem 1rem;
            text-align: center;
            margin-bottom: 1.8rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255,255,255,0.8);
            border: 1px solid #fff6f0;
        }
        .generated-name {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            word-break: break-word;
            background: linear-gradient(145deg, #2c2c36, #4b3b42);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 1px 0 rgba(255,255,255,0.5);
        }
        @media (max-width: 500px) {
            .generated-name { font-size: 1.9rem; }
            .card { padding: 1.5rem; }
        }
        .name-hint {
            font-size: 0.75rem;
            color: #a48a8f;
            margin-top: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 2rem;
        }
        .btn {
            border: none;
            background: rgba(245, 240, 235, 0.9);
            padding: 0.8rem 1.6rem;
            border-radius: 60px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(5px);
            color: #3d2e33;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,250,240,0.8);
        }
        .btn-primary {
            background: linear-gradient(105deg, #fdc8d4, #ffb7c5);
            color: #2d2326;
            box-shadow: 0 6px 14px rgba(255, 150, 170, 0.3);
            border: none;
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            background: linear-gradient(105deg, #ffc1cf, #ffaaba);
            box-shadow: 0 12px 20px rgba(255, 130, 150, 0.35);
        }
        .btn-outline:hover {
            background: rgba(255, 245, 240, 0.95);
            transform: translateY(-2px);
            border-color: #ffbfb0;
        }
        /* Стиль для активной кнопки уведомлений */
        .btn-notify-active {
            background: linear-gradient(105deg, #a8e6cf, #d4edda);
            color: #2d5a3b;
            border: none;
        }
        .btn-notify-active i {
            color: #2d7a4b;
        }

        .copy-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #2c2a2eef;
            backdrop-filter: blur(12px);
            color: white;
            padding: 0.7rem 1.6rem;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.85rem;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .copy-toast.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        .options {
            background: rgba(250, 245, 240, 0.6);
            border-radius: 36px;
            padding: 1.2rem 1.5rem;
            margin-top: 0.5rem;
            text-align: center;
        }
        .style-buttons {
            display: flex;
            gap: 12px;
            background: #f0e9e4;
            padding: 6px;
            border-radius: 100px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 0.8rem;
        }
        .style-option {
            background: transparent;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
            color: #5e4b51;
        }
        .style-option.active {
            background: white;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            color: #b25268;
            font-weight: 700;
        }
        .footer-info {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 1.8rem;
            color: #b2959f;
        }
    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="card">
    <div class="header">
        <div class="badge">
            <i class="fas fa-magic"></i> <span>PWA · работает офлайн</span>
        </div>
        <h1>✨ Генератор ника</h1>
        <div class="sub">Создай запоминающийся username для игр, соцсетей или творчества</div>
    </div>

    <div class="name-display">
        <div class="generated-name" id="usernameDisplay">lunar_whisper</div>
        <div class="name-hint">
            <i class="fas fa-sync-alt"></i> <span>нажми «Случайный» для генерации</span>
        </div>
    </div>

    <div class="action-buttons">
        <button class="btn btn-primary" id="generateBtn">
            <i class="fas fa-dice-d6"></i> Случайное имя
        </button>
        <button class="btn btn-outline" id="copyBtn">
            <i class="far fa-copy"></i> Копировать
        </button>
        <button class="btn btn-outline" id="refreshBtn">
            <i class="fas fa-arrows-rotate"></i> Другое
        </button>
        <button class="btn btn-outline" id="notifyBtn">
            <i class="fas fa-bell"></i> Вкл. уведомления
        </button>
    </div>

    <div class="options">
        <div class="style-selector">
            <span><i class="fas fa-palette"></i> Стиль ника:</span>
            <div class="style-buttons" id="styleGroup">
                <button data-style="cute" class="style-option active">🌸 Милый</button>
                <button data-style="edgy" class="style-option">🌙 Дерзкий</button>
                <button data-style="tech" class="style-option">⚡ Техно</button>
            </div>
        </div>
        <div class="footer-info">
            <i class="fas fa-shield-alt"></i> тысячи уникальных комбинаций
        </div>
    </div>
</div>

<div id="toastMsg" class="copy-toast">
    <i class="fas fa-check-circle"></i> <span>Скопировано!</span>
</div>

<script>
    const dictionaries = {
        cute: {
            prefixes: ["luna", "bunny", "cookie", "peach", "sunny", "honey", "dream", "star", "fairy", "twinkle", "berry", "velvet", "sugar", "glitter", "petal", "mochi", "bubbles", "choco", "vanilla", "blossom", "cotton", "cupcake"],
            suffixes: ["paw", "wink", "smile", "glow", "bloom", "fluff", "sparkle", "heart", "kiss", "dew", "bun", "cake", "puff", "pop", "dolly", "pie", "bean", "snuggle", "sweet", "cloud", "muffin", "hug", "joy"],
            connectors: ["_", ".", ""],
            numbers: ["", "1", "2", "3", "7", "99", "x", "o", "4", "8"]
        },
        edgy: {
            prefixes: ["shadow", "void", "raven", "crimson", "phantom", "night", "fury", "wicked", "storm", "chaos", "vengeance", "silent", "obsidian", "nox", "inferno", "reaper", "hollow", "dark", "ashen", "frost", "midnight", "fallen", "cursed"],
            suffixes: ["bane", "fang", "claw", "wrath", "shade", "ghost", "hunter", "rebel", "knight", "eclipse", "havoc", "rune", "doom", "sorrow", "zero", "edge", "soul", "crypt", "vex", "slayer", "reaver", "spite", "hex"],
            connectors: ["_", "-", ""],
            numbers: ["", "x", "z", "47", "13", "00", "666", "7", "99", "0x"]
        },
        tech: {
            prefixes: ["cyber", "pixel", "data", "nexus", "vector", "codex", "bit", "neon", "quantum", "alpha", "beta", "zero", "sync", "echo", "poly", "grid", "logic", "crypto", "fiber", "meta", "nano", "digital", "hyper", "byte", "axon"],
            suffixes: ["wave", "core", "drive", "link", "node", "script", "frame", "loop", "sys", "craft", "ware", "net", "flux", "byte", "radix", "shell", "stack", "hash", "token", "array", "code", "ping", "packet", "cache"],
            connectors: ["_", ".", ""],
            numbers: ["", "01", "42", "404", "0x", "7", "99", "2k", "10", "808"]
        }
    };

    let currentStyle = "cute";
    let currentGeneratedName = "";
    let notificationsEnabled = false;

    const usernameSpan = document.getElementById("usernameDisplay");
    const generateBtn = document.getElementById("generateBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const copyBtn = document.getElementById("copyBtn");
    const notifyBtn = document.getElementById("notifyBtn");
    const styleOptions = document.querySelectorAll(".style-option");
    const toast = document.getElementById("toastMsg");

    function showToast(message) {
        const toastSpan = toast.querySelector("span");
        toastSpan.innerText = message;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function randomItem(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    function generateUsername() {
        const dict = dictionaries[currentStyle];
        const useNumber = Math.random() < 0.35;
        let prefix = randomItem(dict.prefixes);
        let suffix = randomItem(dict.suffixes);
        let connector = randomItem(dict.connectors);
        
        let rawName = prefix + connector + suffix;
        
        if(useNumber) {
            let numPart = randomItem(dict.numbers);
            if(numPart !== "") rawName = rawName + numPart;
            else rawName = rawName + (Math.floor(Math.random() * 99) + 1);
        }
        
        if(rawName.length > 22) rawName = rawName.slice(0, 20);
        return rawName;
    }

    // Функция для отправки уведомления
    function sendNotification(username, style) {
        if (!notificationsEnabled || Notification.permission !== "granted") return;
        
        const styleNames = {
            cute: "🌸 Милый",
            edgy: "🌙 Дерзкий", 
            tech: "⚡ Техно"
        };
        
        new Notification("✨ Новое имя сгенерировано!", {
            body: `${username}\nСтиль: ${styleNames[style]}`,
            icon: "icon.png",
            badge: "icon.png",
            tag: "username-generation",
            vibrate: [200, 100, 200]
        });
    }

    function updateName() {
        currentGeneratedName = generateUsername();
        usernameSpan.innerText = currentGeneratedName;
        usernameSpan.style.transform = "scale(0.98)";
        setTimeout(() => usernameSpan.style.transform = "scale(1)", 100);
        
        // Отправляем уведомление при генерации
        sendNotification(currentGeneratedName, currentStyle);
    }

    async function copyToClipboard() {
        try {
            await navigator.clipboard.writeText(currentGeneratedName);
            showToast(`📋 "${currentGeneratedName}" скопировано!`);
        } catch(err) {
            const textarea = document.createElement("textarea");
            textarea.value = currentGeneratedName;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand("copy");
            document.body.removeChild(textarea);
            showToast(`✔️ Скопировано: ${currentGeneratedName}`);
        }
    }

    function setStyle(style) {
        currentStyle = style;
        styleOptions.forEach(btn => {
            if(btn.dataset.style === style) btn.classList.add("active");
            else btn.classList.remove("active");
        });
        updateName();
    }

    // Функция для обновления вида кнопки уведомлений
    function updateNotifyButton(enabled) {
        if (enabled) {
            notifyBtn.innerHTML = '<i class="fas fa-bell-slash"></i> Выкл. уведомления';
            notifyBtn.classList.add("btn-notify-active");
        } else {
            notifyBtn.innerHTML = '<i class="fas fa-bell"></i> Вкл. уведомления';
            notifyBtn.classList.remove("btn-notify-active");
        }
    }

    // Функция запроса разрешения на уведомления
    async function requestNotificationPermission() {
        if (!("Notification" in window)) {
            showToast("❌ Ваш браузер не поддерживает уведомления");
            return false;
        }
        
        if (Notification.permission === "granted") {
            notificationsEnabled = true;
            updateNotifyButton(true);
            showToast("🔔 Уведомления включены");
            return true;
        }
        
        if (Notification.permission !== "denied") {
            const permission = await Notification.requestPermission();
            if (permission === "granted") {
                notificationsEnabled = true;
                updateNotifyButton(true);
                showToast("🔔 Уведомления включены");
                return true;
        }
        }
        
        updateNotifyButton(false);
        return false;
    }

    generateBtn.addEventListener("click", updateName);
    refreshBtn.addEventListener("click", updateName);
    copyBtn.addEventListener("click", copyToClipboard);
    
    // Обработчик кнопки уведомлений
    notifyBtn.addEventListener("click", () => {
        if (notificationsEnabled) {
            notificationsEnabled = false;
            updateNotifyButton(false);
            showToast("🔕 Уведомления выключены");
        } else {
            requestNotificationPermission();
        }
    });
    
    styleOptions.forEach(btn => {
        btn.addEventListener("click", () => setStyle(btn.dataset.style));
    });

    // Проверяем статус разрешения при загрузке
    if ("Notification" in window && Notification.permission === "granted") {
        notificationsEnabled = true;
        updateNotifyButton(true);
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(reg => {
            console.log('SW registered:', reg);
        }).catch(err => console.log('SW error:', err));
    }

    updateName();
</script>
</body>
</html>
